<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>処方箋QRリーダー</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #f0f4f8;
  color: #1e293b;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  background: #2563eb;
  color: #fff;
  padding: 14px 20px;
  text-align: center;
  font-size: 1.1rem;
  font-weight: 700;
}

.container {
  width: 100%;
  max-width: 500px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.camera-box {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.scan-line {
  position: absolute;
  top: 10%;
  left: 5%;
  right: 5%;
  height: 3px;
  background: #22c55e;
  box-shadow: 0 0 10px #22c55e;
  animation: scan 2s ease-in-out infinite;
  pointer-events: none;
  display: none;
}

@keyframes scan {
  0%   { top: 10%; }
  50%  { top: 85%; }
  100% { top: 10%; }
}

.badge {
  text-align: center;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
}
.badge.scanning { background: #dcfce7; color: #166534; }
.badge.ok       { background: #dbeafe; color: #1e40af; }
.badge.sent     { background: #d1fae5; color: #065f46; }
.badge.off      { background: #f1f5f9; color: #64748b; }
.badge.error    { background: #fee2e2; color: #991b1b; }

.btn-row {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: .15s;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.btn-green  { background: #16a34a; color: #fff; }
.btn-red    { background: #dc2626; color: #fff; }

#scan-canvas { display: none; }
</style>
</head>
<body>

<header>処方箋QRリーダー</header>

<div class="container">
  <div class="camera-box">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-line" id="scan-line"></div>
  </div>

  <div class="badge off" id="badge">カメラ起動中...</div>

  <div class="btn-row">
    <button class="btn btn-green" id="btn-next" disabled>🔄 次を撮影</button>
    <button class="btn btn-red" id="btn-stop" disabled>⏹ カメラ停止</button>
  </div>
</div>

<canvas id="scan-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
'use strict';

// ★★★ ここにGAS WebApp URLをベタ書き ★★★
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzIw4b8_A6QSZgi_jr8GDKIRQc1nNozci9sM-iZk0gvDv4hfdAdKVXlzYsI5CUoaHza/exec';

const video    = document.getElementById('video');
const scanLine = document.getElementById('scan-line');
const badge    = document.getElementById('badge');
const btnNext  = document.getElementById('btn-next');
const btnStop  = document.getElementById('btn-stop');
const scanCvs  = document.getElementById('scan-canvas');
const scanCtx  = scanCvs.getContext('2d', { willReadFrequently: true });

let stream   = null;
let scanning = false;
let rafId    = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    scanLine.style.display = 'block';
    setBadge('scanning', 'QRコードをかざしてください');
    btnNext.disabled = true;
    btnStop.disabled = false;
    rafId = requestAnimationFrame(loop);
  } catch (e) {
    setBadge('error', 'カメラを起動できませんでした');
  }
}

function stopCamera() {
  scanning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  scanLine.style.display = 'none';
  btnStop.disabled = true;
  setBadge('off', 'カメラ停止中');
  btnNext.textContent = '📸 カメラ起動';
  btnNext.disabled = false;
}

function loop() {
  if (!scanning) return;
  if (video.readyState >= video.HAVE_ENOUGH_DATA) {
    const w = video.videoWidth;
    const h = video.videoHeight;
    scanCvs.width = w;
    scanCvs.height = h;
    scanCtx.drawImage(video, 0, 0, w, h);
    const img = scanCtx.getImageData(0, 0, w, h);
    const code = jsQR(img.data, w, h, { inversionAttempts: 'dontInvert' });
    if (code) {
      onDetected(code);
      return;
    }
  }
  rafId = requestAnimationFrame(loop);
}

function onDetected(code) {
  scanning = false;
  scanLine.style.display = 'none';

  let csv;
  try {
    csv = new TextDecoder('shift_jis').decode(new Uint8Array(code.binaryData));
  } catch (_) {
    csv = code.data;
  }

  setBadge('ok', '✅ 読み取り完了！送信中...');
  btnNext.textContent = '🔄 次を撮影';
  btnNext.disabled = false;

  sendToSheet(csv);
}

// ★ GASの doPost に合わせて POST + JSON で送信 ★
async function sendToSheet(csv) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ qrData: csv })
    });
    setBadge('sent', '🎉 送信完了！');
  } catch (e) {
    setBadge('error', '❌ 送信に失敗しました');
  }
}

function setBadge(type, msg) {
  badge.className = 'badge ' + type;
  badge.textContent = msg;
}

btnNext.addEventListener('click', () => {
  if (stream) stopCamera();
  startCamera();
});

btnStop.addEventListener('click', stopCamera);

startCamera();
</script>
</body>
</html>
