<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner (JAHIS対応版)</title>
    <!-- jsQRライブラリの読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border: 2px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: none;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        canvas {
            display: none;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: #fff;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status-message {
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            min-height: 24px;
            white-space: pre-wrap; /* 改行を正しく表示するため */
        }
    </style>
</head>
<body>

    <h1>処方箋QR Scanner</h1>
    
    <div id="status-message">「カメラを起動」ボタンを押してください</div>

    <div id="video-container">
        <video id="qr-video" playsinline></video>
    </div>
    
    <canvas id="qr-canvas"></canvas>

    <div>
        <button id="start-btn" class="btn" onclick="startCamera()">カメラを起動</button>
        <button id="rescan-btn" class="btn" style="display:none;" onclick="startCamera()">再度スキャンする</button>
    </div>

    <script>
        // ごーさんのGAS WebアプリURL
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzIw4b8_A6QSZgi_jr8GDKIRQc1nNozci9sM-iZk0gvDv4hfdAdKVXlzYsI5CUoaHza/exec';
                            
        
        let currentStream = null;
        let requestAnimationFrameId = null;
        const video = document.getElementById('qr-video');
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d');
        const statusMessage = document.getElementById('status-message');
        const videoContainer = document.getElementById('video-container');
        const startBtn = document.getElementById('start-btn');
        const rescanBtn = document.getElementById('rescan-btn');

        async function startCamera() {
            statusMessage.innerText = "カメラを起動中...";
            startBtn.style.display = "none";
            rescanBtn.style.display = "none";
            videoContainer.style.display = "block";

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                
                video.srcObject = currentStream;
                video.play();
                requestAnimationFrameId = requestAnimationFrame(scanQRCode);
                statusMessage.innerText = "処方箋のQRコードをカメラにかざしてください";
            } catch (err) {
                console.error("カメラの起動エラー:", err);
                statusMessage.innerText = "カメラの起動に失敗しました。権限を確認してください。";
                startBtn.style.display = "inline-block";
                videoContainer.style.display = "none";
            }
        }

        function stopCamera() {
            if (requestAnimationFrameId) {
                cancelAnimationFrame(requestAnimationFrameId);
                requestAnimationFrameId = null;
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            video.srcObject = null;
            videoContainer.style.display = "none";
        }

        function scanQRCode() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    stopCamera();
                    
                    let qrText = "";
                    try {
                        // JAHIS規格（Shift_JIS）を強制的にデコードする理屈の核心部分
                        if (code.binaryData && code.binaryData.length > 0) {
                            const uint8Array = new Uint8Array(code.binaryData);
                            const decoder = new TextDecoder('shift-jis');
                            qrText = decoder.decode(uint8Array);
                        }
                    } catch (e) {
                        console.error("Shift_JISデコードエラー:", e);
                    }

                    // デコード失敗時や空文字の場合は元のjsQRの解読結果をフォールバックとして使う
                    if (!qrText) {
                        qrText = code.data;
                    }

                    statusMessage.innerText = `検出完了！データ送信中...\n（先頭の文字: ${qrText.substring(0, 15)}...）`;
                    
                    sendDataToGAS(qrText);
                    return; 
                }
            }
            requestAnimationFrameId = requestAnimationFrame(scanQRCode);
        }

        async function sendDataToGAS(qrData) {
            try {
                const response = await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: JSON.stringify({ qrData: qrData })
                });

                const result = await response.json();
                
                if (result.success) {
                    statusMessage.innerText = `スプシへの送信成功！\n書き込み行: ${result.rowNumber}行目`;
                } else {
                    statusMessage.innerText = `GASエラー: ${result.message}`;
                    console.error("GASエラー詳細:", result);
                }
            } catch (error) {
                console.error('通信エラー:', error);
                statusMessage.innerText = "通信エラーが発生しました。ネットワークを確認してください。";
            } finally {
                rescanBtn.style.display = "inline-block";
            }
        }
    </script>
</body>
</html>
